    <style>
        :root {
            --bg-color: #fffafa;
            --card-bg: #ffffff;
            --accent-pink: #ff85a2;
            --light-pink: #ffe4e9;
            --text-main: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.1);
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-section {
            position: relative;
            height: 180px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #pfp-popup {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            margin: 0;
            font-size: 1em;
            color: var(--accent-pink);
            font-weight: bold;
            background: var(--light-pink);
            border-radius: 20px;
            padding: 4px 14px;
            width: max-content;
            text-align: center;
            box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3);
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease, visibility 0.2s ease;
        }

        .pfp-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
            width: 390px;
            height: 130px;
            margin: 0 auto;
            transition: all 0.3s ease;
        }

        .pfp-container img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid var(--light-pink);
            object-fit: cover;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 133, 162, 0.2);
            z-index: 1;
        }

        .pfp-left {
            opacity: 0.5;
            transform: scale(0.75);
        }

        .pfp-center {
            opacity: 1;
            transform: scale(1);
            z-index: 2;
        }

        .pfp-right {
            opacity: 0.5;
            transform: scale(0.75);
        }

        .pfp-hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.6);
        }

        .pfp-hint {
            font-size: 0.7em;
            color: #d1a7b0;
            margin-top: 5px;
        }

        h1 {
            margin: 10px 0;
            color: var(--accent-pink);
            font-size: 2.2em;
        }

        .mic-status {
            font-size: 1em;
            color: #d1a7b0;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-item {
            background: var(--light-pink);
            padding: 10px;
            border-radius: 12px;
            font-size: 0.9em;
            font-weight: 600;
            position: relative;
            cursor: default;
        }

        .stat-item[data-hint]:hover::after {
            content: attr(data-hint);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-main);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75em;
            font-weight: 400;
            white-space: nowrap;
            z-index: 10;
            animation: fadeIn 0.2s ease;
        }

        .stat-item[data-hint]:hover::before {
            content: '';
            position: absolute;
            bottom: calc(100% + 2px);
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: var(--text-main);
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(4px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .bio {
            line-height: 1.7;
            margin: 25px 0;
            background: #fffcfc;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--accent-pink);
            text-align: left;
        }

        .social-links {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 25px 0;
        }

        .social-links a {
            color: var(--accent-pink);
            font-size: 1.8em;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
        }

        .social-links img.roblox-icon {
            width: 28px;
            height: 28px;
        }

        .social-links a:hover {
            transform: translateY(-3px);
        }

        .btn-work {
            background: var(--accent-pink);
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 40px;
            transition: opacity 0.2s;
        }

        .btn-work:hover {
            opacity: 0.9;
        }

        .section-title {
            text-align: left;
            border-bottom: 2px solid var(--light-pink);
            padding-bottom: 5px;
            margin-bottom: 15px;
            font-size: 1.2em;
            color: var(--accent-pink);
            font-weight: bold;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .game-card {
            position: relative;
            aspect-ratio: 2 / 3;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f0f0;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 133, 162, 0.9);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            font-weight: bold;
            padding: 10px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .game-card:hover .game-overlay {
            opacity: 1;
        }

        .game-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            padding: 18px;
            color: var(--text-main);
            background: linear-gradient(180deg, #fffafa 0%, #ffe4e9 100%);
        }

        .disclaimer {
            background: #fff6f8;
            color: #6b2f45;
            border: 1px solid #ffd4df;
            border-radius: 14px;
            padding: 14px 18px;
            margin: 20px 0;
            font-size: 0.95em;
            text-align: left;
            line-height: 1.6;
        }

        a {
            color: var(--accent-pink);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Clock / Timezone Layout Styles */
        .timezone-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 20px;
            padding: 5px 10px;
            background: #fffcfc;
            border-radius: 20px;
            border: 1px solid var(--light-pink);
        }

        .timezone-info {
            text-align: left;
        }

        .timezone-info h2 {
            margin: 0;
            font-size: 1.3em;
            color: var(--accent-pink);
        }

        .timezone-sub {
            font-size: 0.8em;
            color: #d1a7b0;
        }

        .hybrid-clock {
            position: relative;
            width: 70px;
            height: 70px;
            border: 2px solid var(--light-pink);
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(255, 133, 162, 0.05);
        }

        .hybrid-hand {
            position: absolute;
            width: 50%;
            top: 50%;
            transform-origin: 100%;
            height: 2px;
            border-radius: 2px;
        }

        .h-hour {
            width: 25%;
            left: 25%;
            background: var(--text-main);
            height: 3px;
        }

        .h-min {
            width: 35%;
            left: 15%;
            background: #8a8a8a;
        }

        .h-sec {
            width: 38%;
            left: 12%;
            background: var(--accent-pink);
            height: 1px;
        }

        .hybrid-digital {
            position: absolute;
            font-size: 0.8em;
            font-weight: bold;
            color: var(--text-main);
            z-index: 5;
            background: rgba(255, 254, 254, 0.85);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: monospace;
        }

        .schedule-box h1 {
            font-size: 1.6em;
            margin: 15px 0 10px 0;
            text-align: left;
        }
    </style>
</head>
