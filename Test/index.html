<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Locked Page</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        .hidden { display: none; }
        .btn { padding: 10px 20px; background: #5865F2; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

    <div id="login-gate">
        <h1>Restricted Access</h1>
        <p>You must log in with Discord to verify you are a member of our server.</p>
        <a id="login-btn" class="btn" href="https://discord.com/oauth2/authorize?client_id=1523084437372534956&redirect_uri=https%3A%2F%2Fflairdiva.github.io%2Fme%2FTest%2F&response_type=token&scope=identify%20guilds">
            Login with Discord
        </a>
    </div>

    <div id="secret-content" class="hidden">
        <h1>Welcome! Guild Member 🎉</h1>
        <p>You have access because you are in the required Discord server.</p>
    </div>

    <div id="error-gate" class="hidden">
        <h1>Access Denied</h1>
        <p>Sorry, you are not a member of the required Discord server.</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Replace this with your Discord Server (Guild) ID
        const TARGET_GUILD_ID = '1478839252149342354'; 

        function getAccessToken() {
            if (!window.location.hash) return null;
            const fragment = new URLSearchParams(window.location.hash.slice(1));
            return fragment.get('access_token');
        }

        async function verifyUser() {
            const token = getAccessToken();
            if (!token) return;

            document.getElementById('login-gate').classList.add('hidden');

            try {
                // Fetch the list of servers the logged-in user is currently in
                const response = await fetch('https://discord.com/api/v10/users/@me/guilds', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const guilds = await response.json();

                // If Discord returns an error structure instead of an array
                if (!Array.isArray(guilds)) {
                    throw new Error("Failed to fetch guilds list.");
                }

                // Check if any of the user's servers match your target Server ID
                const isMember = guilds.some(guild => guild.id === TARGET_GUILD_ID);

                if (isMember) {
                    document.getElementById('secret-content').classList.remove('hidden');
                } else {
                    document.getElementById('error-gate').classList.remove('hidden');
                }
            } catch (error) {
                console.error("Verification failed:", error);
                alert("Error verifying server membership.");
                document.getElementById('login-gate').classList.remove('hidden');
            }
        }

        window.onload = verifyUser;
    </script>
</body>
</html>
