<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitelisted Discord Page</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 50px; }
        .hidden { display: none; }
        .btn { padding: 10px 20px; background: #5865F2; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

    <div id="login-gate">
        <h1>Restricted Access</h1>
        <p>You must log in with Discord to verify your identity.</p>
        <a id="login-btn" class="btn" href="https://discord.com/oauth2/authorize?client_id=1523084437372534956&response_type=code&redirect_uri=https%3A%2F%2Fflairdiva.github.io%2Fme%2FTest%2F&scope=identify">
            Login with Discord
        </a>
    </div>

    <div id="secret-content" class="hidden">
        <h1>Welcome to the Secret Club! 🎉</h1>
        <p>Your Discord ID is whitelisted. You can see this content now.</p>
    </div>

    <div id="error-gate" class="hidden">
        <h1>Access Denied</h1>
        <p>Sorry, your Discord ID is not on the whitelist.</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        // Put the allowed Discord User IDs here
        const WHITELIST = ['123456789012345678', '987654321098765432']; 

        // Function to extract the access token from the URL hash after Discord login
        function getAccessToken() {
    // Check if there is a hash in the URL
    console.log("Current URL Hash:", window.location.hash); 
    
    if (!window.location.hash) return null;
    
    const fragment = new URLSearchParams(window.location.hash.slice(1));
    return fragment.get('access_token');
}

        async function verifyUser() {
            const token = getAccessToken();
            if (!token) return; // User hasn't logged in yet

            // Hide the login button while verifying
            document.getElementById('login-gate').classList.add('hidden');

            try {
                // Fetch user data from Discord directly from the browser
                const response = await fetch('https://discord.com/api/v10/users/@me', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const userData = await response.json();

                // Check if the user's ID is in the whitelist
                if (WHITELIST.includes(userData.id)) {
                    // Show secret content
                    document.getElementById('secret-content').classList.remove('hidden');
                } else {
                    // Show access denied
                    document.getElementById('error-gate').classList.remove('hidden');
                }
            } catch (error) {
                console.error("Verification failed:", error);
                alert("Error verifying Discord account.");
                document.getElementById('login-gate').classList.remove('hidden');
            }
        }

        // Run the check when the page loads
        window.onload = verifyUser;
    </script>
</body>
</html>
